<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Honey Typing: Neon Digit & Symbol Master</title>
<style>
  :root {
    --bg-color: #05050a; --card-bg: #10101e; --text-color: #00f2ff;
    --accent-color: #7000ff; --correct-color: #39ff14; --wrong-color: #ff3131;
    --timer-color: #fce205; --bee-yellow: #ffd700;
    --dim-white: #aaaaaa;
    --bee-speed: 1s;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-color); color: #fff;
    margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
    height: 100vh; overflow: hidden;
  }

  header { width: 100%; text-align: center; padding: 10px 0 5px; }
  header h1 { margin: 0; font-size: 1.4rem; color: var(--text-color); letter-spacing: 5px; text-shadow: 0 0 10px var(--text-color); }

  nav {
    width: 100%; background: #1a1a2e; display: flex; justify-content: center;
    gap: 8px; padding: 8px 0; border-bottom: 2px solid var(--accent-color);
  }
  nav button {
    background: none; border: 1px solid var(--accent-color); color: var(--text-color);
    padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 0.9rem;
  }
  nav button.active { background: var(--accent-color); color: #fff; box-shadow: 0 0 15px var(--accent-color); }

  .container { 
    flex: 1; width: 90%; max-width: 900px; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; padding-bottom: 20px;
  }

  #bee-track {
    width: 100%; height: 50px; background: rgba(255,255,255,0.02);
    border-radius: 25px; margin: 10px 0; position: relative; border: 1px solid #333; overflow: hidden;
  }
  #hive, #honey-pot { position: absolute; top: 12px; font-size: 20px; z-index: 5; }
  #hive { left: 20px; } #honey-pot { right: 20px; }
  #bee {
    position: absolute; left: 60px; top: 8px; font-size: 28px;
    transition: left 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); z-index: 10;
  }
  #active-line {
    position: absolute; top: 0; left: 0; width: 0%; height: 100%;
    background: linear-gradient(90deg, rgba(112,0,255,0.15), rgba(0,242,255,0.15));
    border-right: 2px solid var(--text-color); transition: width 0.4s;
  }

  .selector-bar { display: none; justify-content: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .sel-btn {
    padding: 6px 12px; background: #222; border: 1px solid #444; color: #ccc;
    border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
  }
  .sel-btn.active { background: var(--text-color); color: #000; font-weight: bold; border-color: var(--text-color); }

  .dashboard { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
  .stat-card { background: var(--card-bg); padding: 10px 20px; border-radius: 12px; border: 1px solid #333; min-width: 110px; text-align: center; }
  .stat-label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 4px; font-weight: bold; }
  .stat-val { font-size: 1.4rem; font-weight: bold; }

  #collection-shelf { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; min-height: 28px; }
  .honey-mark { font-size: 18px; filter: drop-shadow(0 0 5px orange); color: var(--dim-white); font-weight: normal; }

  #display-box {
    width: 100%; background: var(--card-bg); padding: 40px 30px; border-radius: 25px;
    border: 1px solid #333; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #target-text { font-size: 3.5rem; font-weight: bold; min-height: 80px; display: flex; justify-content: center; flex-wrap: wrap; }
  .char { color: #222233; letter-spacing: 8px; transition: 0.1s; position: relative; border-bottom: 5px solid transparent; }
  
  .char.space { color: transparent; min-width: 30px; text-align: center; border-bottom: 4px solid rgba(255,255,255,0.08); }
  .char.active { color: #fff; border-bottom-color: var(--text-color); }
  .char.space.active { border-bottom-color: var(--text-color); }
  .char.correct { color: var(--correct-color); border-bottom-color: transparent; }
  .char.wrong { color: var(--wrong-color); background: rgba(255,0,0,0.1); border-radius: 5px; }

  #finger-guide { font-size: 1.25rem; color: var(--timer-color); margin-top: 25px; font-weight: bold; height: 1.5rem; text-shadow: 0 0 5px rgba(0,0,0,0.3); }

  #celeb-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(16, 16, 30, 0.98); border-radius: 25px;
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
    border: 2px solid var(--correct-color);
  }
  .celeb-title { font-size: 2rem; color: var(--correct-color); font-weight: bold; margin-bottom: 12px; }

  #analysis-view { width: 100%; display: none; grid-template-columns: repeat(2, 1fr); gap: 15px; text-align: left; }
  .analysis-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid #222; }
  .analysis-title { color: var(--text-color); font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; }
  .weak-key { display: inline-block; background: var(--wrong-color); color: white; padding: 2px 8px; border-radius: 5px; margin-right: 5px; font-weight: bold; }

  #hiddenInput { position: absolute; opacity: 0; pointer-events: none; }
  .bumble { animation: bumble 1s infinite alternate ease-in-out; }
  @keyframes bumble { from { transform: rotate(-5deg); } to { transform: rotate(5deg) translateY(-5px); } }
  .shake { animation: shake 0.2s; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
</style>
</head>
<body onclick="document.getElementById('hiddenInput').focus()">

<header>
  <h1>HONEY TYPING</h1>
</header>

<nav>
  <button id="nav-step" onclick="switchMainTab('step')">🛣️ Mastery Steps</button>
  <button id="nav-numpad" onclick="switchMainTab('numpad')">⌨️ Numpad</button>
  <button id="nav-single" onclick="switchMainTab('single')">🎯 Single Drill</button>
  <button id="nav-game" onclick="switchMainTab('game')">🏆 Time Attack</button>
  <button id="nav-report" onclick="switchMainTab('report')">📊 Analysis Report</button>
</nav>

<div class="container">
  <div id="bee-track">
    <div id="hive">🏠</div>
    <div id="active-line"></div>
    <div id="bee" class="bumble">🐝</div>
    <div id="honey-pot">🍯</div>
  </div>

  <div id="step-selector" class="selector-bar">
    <button class="sel-btn" onclick="setCourse('alpha-home')">1. Home Row</button>
    <button class="sel-btn" onclick="setCourse('alpha-top')">2. Top Row</button>
    <button class="sel-btn" onclick="setCourse('alpha-bot')">3. Bottom Row</button>
    <button class="sel-btn" onclick="setCourse('digit')">4. Digits</button>
    <button class="sel-btn" onclick="setCourse('symbol')">5. Symbols</button>
    <button class="sel-btn" onclick="setCourse('full')">🏁 Full Mix</button>
  </div>

  <div id="numpad-selector" class="selector-bar">
    <button class="sel-btn" onclick="setCourse('num-full')">Numpad Master</button>
  </div>

  <div class="dashboard">
    <div class="stat-card"><span class="stat-label">REAL-TIME WPM</span><span id="wpm-val" class="stat-val">0</span></div>
    <div class="stat-card"><span class="stat-label">TIME</span><span id="timer-val" class="stat-val">--</span></div>
    <div class="stat-card"><span class="stat-label">ACCURACY</span><span id="acc-val" class="stat-val">0%</span></div>
  </div>

  <div id="collection-shelf"></div>

  <div id="display-box">
    <div id="typing-view" style="width:100%; text-align:center;">
        <div id="target-text"></div>
        <div id="finger-guide"></div>
    </div>
    
    <div id="analysis-view">
        <div class="analysis-card">
            <div class="analysis-title">📈 Session Stats</div>
            <div id="stat-total-chars">Total Keystrokes: 0</div>
            <div id="stat-avg-wpm">Average Speed: 0 WPM</div>
            <div id="stat-avg-acc">Average Accuracy: 0%</div>
        </div>
        <div class="analysis-card">
            <div class="analysis-title">⚠️ Weak Keys (Top 3)</div>
            <div id="stat-weak-keys">Collecting data...</div>
        </div>
        <div class="analysis-card" style="grid-column: span 2;">
            <div class="analysis-title">🏆 Session Best</div>
            <div id="stat-best-record">No records yet.</div>
        </div>
    </div>

    <div id="celeb-overlay">
      <div id="celeb-title-text" class="celeb-title">🍯 HONEY COLLECTED! 🍯</div>
      <div id="celeb-stats" style="font-size: 1.4rem; margin-bottom: 20px;"></div>
      <div id="celeb-subtext" style="color: #888;">Press any key to start the next flight</div>
    </div>
  </div>
</div>

<input type="text" id="hiddenInput" autocomplete="off" autofocus>

<script>
let sessionHistory = []; 
let keyMistakes = {};
let totalTypedInSession = 0;
let bestWPM = 0;
let honeyCount = 0;
let singleKeyCounter = 0;

const FINGER_MAP = {
  'q':'Left Pinky', 'a':'Left Pinky', 'z':'Left Pinky', '1':'Left Pinky', '!':'L-Pinky + R-Shift',
  'w':'Left Ring', 's':'Left Ring', 'x':'Left Ring', '2':'Left Ring', '@':'L-Ring + R-Shift',
  'e':'Left Middle', 'd':'Left Middle', 'c':'Left Middle', '3':'Left Middle', '#':'L-Middle + R-Shift',
  'r':'Left Index', 'f':'Left Index', 'v':'Left Index', '4':'Left Index', '$':'L-Index + R-Shift',
  't':'Left Index', 'g':'Left Index', 'b':'Left Index', '5':'Left Index', '%':'L-Index + R-Shift',
  'y':'Right Index', 'h':'Right Index', 'n':'Right Index', '6':'Right Index', '^':'R-Index + L-Shift',
  'u':'Right Index', 'j':'Right Index', 'm':'Right Index', '7':'Right Index', '&':'R-Index + L-Shift',
  'i':'Right Middle', 'k':'Right Middle', ',':'Right Middle', '8':'Right Middle', '*':'R-Middle + L-Shift', '<':'R-Middle + L-Shift',
  'o':'Right Ring', 'l':'Right Ring', '.':'Right Ring', '9':'Right Ring', '(':'R-Ring + L-Shift', '>':'R-Ring + L-Shift',
  'p':'Right Pinky', ';':'Right Pinky', '/':'Right Pinky', '0':'Right Pinky', ')':'R-Pinky + L-Shift', ':':'R-Pinky + L-Shift',
  '-':'Right Pinky', '=':'Right Pinky', '[':'Right Pinky', ']':'Right Pinky', "'":'Right Pinky', '\\':'Right Pinky',
  '_':'R-Pinky + L-Shift', '+':'R-Pinky + L-Shift', '{':'R-Pinky + L-Shift', '}':'R-Pinky + L-Shift', '|':'R-Pinky + L-Shift', '"':'R-Pinky + L-Shift', '?':'R-Pinky + L-Shift',
  ' ':'Either Thumb (Space)'
};

const POOLS = {
  'alpha-home': "asdfjkl; ", 'alpha-top': "qwertyuiop ", 'alpha-bot': "zxcvbnm,./ ",
  'digit': "1234567890 ", 'symbol': "!@#$%^&*()_+{}|:\"<>? ", 'num-full': "0123456789+-*/.",
  'all': "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{};:'\",./<>?\\ "
};

const SENTENCES = [
  "The quick brown fox jumps over the lazy dog.",
  "Honey Typing makes your fingers dance like a bee.",
  "Stay hungry, stay foolish. - Steve Jobs",
  "function honeyTyping() { return 'Delicious!'; }",
  "Life is 10% what happens and 90% how you react.",
  "Practice makes perfect. Every keystroke counts!",
  "01234-5678-8910 symbols: @#$ &*!"
];

let activeTab = 'step', activeCourse = 'alpha-home', targetText = "", curIdx = 0;
let typedTotal = 0, mistakeTotal = 0, startTime = null, timer = null, isFinished = false;
let keyTimes = [], instantWPM = 0, lastInputTime = Date.now();

function switchMainTab(tab) {
  activeTab = tab;
  hideCelebration();
  resetState();
  
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  
  const typingView = document.getElementById('typing-view');
  const analysisView = document.getElementById('analysis-view');
  document.querySelectorAll('.selector-bar').forEach(b => b.style.display = 'none');

  if (tab === 'report') {
    typingView.style.display = 'none';
    analysisView.style.display = 'grid';
    updateAnalysisReport();
  } else {
    typingView.style.display = 'block';
    analysisView.style.display = 'none';
    if (tab === 'step') document.getElementById('step-selector').style.display = 'flex';
    if (tab === 'numpad') document.getElementById('numpad-selector').style.display = 'flex';
    
    let defaultCourse = tab === 'step' ? 'alpha-home' : (tab === 'numpad' ? 'num-full' : (tab === 'single' ? 'all' : 'game'));
    setCourse(defaultCourse);
  }
}

function setCourse(id) {
  activeCourse = id;
  document.querySelectorAll('.sel-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick')?.includes(`'${id}'`)));
  resetState();
}

function resetState() {
  clearInterval(timer); startTime = null; timer = null;
  typedTotal = 0; mistakeTotal = 0; curIdx = 0; instantWPM = 0; keyTimes = []; singleKeyCounter = 0;
  document.getElementById('wpm-val').textContent = '0';
  document.getElementById('acc-val').textContent = '0%';
  document.getElementById('timer-val').textContent = (activeTab === 'game') ? '30' : '--';
  document.getElementById('celeb-overlay').style.display = 'none';
  isFinished = false;
  if (activeTab !== 'report') nextSentence();
}

function nextSentence() {
  if (activeTab === 'single') {
    const pool = POOLS['all'];
    targetText = pool[Math.floor(Math.random() * pool.length)];
  } else if (activeCourse === 'game' || activeCourse === 'full') {
    targetText = SENTENCES[Math.floor(Math.random() * SENTENCES.length)];
  } else {
    const pool = POOLS[activeCourse];
    targetText = "";
    for(let i=0; i<12; i++) targetText += pool[Math.floor(Math.random() * pool.length)];
  }
  curIdx = 0; renderText();
}

function renderText() {
  const box = document.getElementById('target-text');
  box.innerHTML = '';
  [...targetText].forEach((c, i) => {
    const span = document.createElement('span');
    span.textContent = (c === ' ') ? '\u00A0' : c;
    span.className = 'char' + (c === ' ' ? ' space' : '');
    if(i === curIdx) span.classList.add('active');
    if(i < curIdx) span.classList.add('correct');
    box.appendChild(span);
  });
  updateGuide();
  updateBee();
}

function updateGuide() {
  const guide = document.getElementById('finger-guide');
  let char = targetText[curIdx];
  guide.textContent = FINGER_MAP[char] || FINGER_MAP[char?.toLowerCase()] || "Check English Mode!";
}

function updateBee() {
  let prog = (activeTab === 'single') ? (singleKeyCounter / 20) : (curIdx / targetText.length);
  prog = Math.min(1, Math.max(0, prog));
  const trackW = document.getElementById('bee-track').offsetWidth - 120;
  document.getElementById('bee').style.left = (60 + trackW * prog) + 'px';
  document.getElementById('active-line').style.width = (prog * 100) + '%';
}

function addHoneyMark() {
  honeyCount++;
  const shelf = document.getElementById('collection-shelf');
  if (honeyCount < 10) {
    const jar = document.createElement('span');
    jar.className = 'honey-mark'; jar.textContent = '🍯';
    shelf.appendChild(jar);
  } else {
    shelf.innerHTML = `<span class="honey-mark">🍯 <span style="color:var(--dim-white); font-size:16px;">X</span> ${honeyCount}</span>`;
  }
}

function showCelebration() {
  isFinished = true;
  addHoneyMark();
  
  const finalWpm = parseInt(document.getElementById('wpm-val').textContent);
  const finalAcc = parseInt(document.getElementById('acc-val').textContent);
  sessionHistory.push({ wpm: finalWpm, acc: finalAcc, typed: typedTotal });
  if (finalWpm > bestWPM) bestWPM = finalWpm;

  const zone = document.getElementById('celeb-overlay');
  const stats = document.getElementById('celeb-stats');
  const title = document.getElementById('celeb-title-text');
  const subtext = document.getElementById('celeb-subtext');

  if (activeTab === 'single') {
    title.textContent = "🎯 DRILL COMPLETE! 🎯";
    title.style.color = "var(--text-color)";
    subtext.textContent = "Drill data has been saved to your report.";
  } else {
    title.textContent = "🍯 HONEY COLLECTED! 🍯";
    title.style.color = "var(--correct-color)";
    subtext.textContent = "Press any key to start the next flight";
  }

  stats.innerHTML = `Accuracy: ${finalAcc}% | Speed: ${finalWpm} WPM`;
  zone.style.display = 'flex';
}

function hideCelebration() {
  isFinished = false;
  document.getElementById('celeb-overlay').style.display = 'none';
}

function updateAnalysisReport() {
    if (sessionHistory.length === 0) return;
    const totalChars = totalTypedInSession;
    const avgWpm = Math.round(sessionHistory.reduce((a, b) => a + b.wpm, 0) / sessionHistory.length);
    const avgAcc = Math.round(sessionHistory.reduce((a, b) => a + b.acc, 0) / sessionHistory.length);

    document.getElementById('stat-total-chars').textContent = `Total Keystrokes: ${totalChars}`;
    document.getElementById('stat-avg-wpm').textContent = `Average Speed: ${avgWpm} WPM`;
    document.getElementById('stat-avg-acc').textContent = `Average Accuracy: ${avgAcc}%`;
    document.getElementById('stat-best-record').textContent = `Max Speed: ${bestWPM} WPM (Session Record)`;

    const sortedMistakes = Object.entries(keyMistakes).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const weakKeyBox = document.getElementById('stat-weak-keys');
    if (sortedMistakes.length > 0) {
        weakKeyBox.innerHTML = sortedMistakes.map(m => `<span class="weak-key">${m[0].toUpperCase()}</span>`).join(' ');
    } else {
        weakKeyBox.textContent = "Perfect! No frequent mistakes.";
    }
}

document.getElementById('hiddenInput').addEventListener('input', (e) => {
  if (isFinished) { hideCelebration(); resetState(); return; }
  const char = e.target.value.slice(-1);
  e.target.value = "";
  const now = Date.now(); lastInputTime = now;
  if(!startTime) startTime = now;
  if(activeTab === 'game' && !timer) startTimer();

  if(char === targetText[curIdx]) {
    keyTimes.push(now); if(keyTimes.length > 10) keyTimes.shift();
    curIdx++; typedTotal++; totalTypedInSession++;
    
    if (activeTab === 'single') {
      singleKeyCounter++;
      if (singleKeyCounter >= 20) showCelebration();
      else nextSentence();
    } else if(curIdx >= targetText.length) {
      if(activeTab === 'game') nextSentence(); else showCelebration();
    } else { renderText(); }

  } else {
    mistakeTotal++;
    const wrongKey = targetText[curIdx].toLowerCase();
    keyMistakes[wrongKey] = (keyMistakes[wrongKey] || 0) + 1;
    document.getElementById('display-box').classList.add('shake');
    setTimeout(() => document.getElementById('display-box').classList.remove('shake'), 200);
  }

  const acc = typedTotal === 0 ? 0 : Math.round(((typedTotal - mistakeTotal) / typedTotal) * 100);
  document.getElementById('acc-val').textContent = acc + "%";
});

function startTimer() {
  let left = 30;
  timer = setInterval(() => {
    left--; document.getElementById('timer-val').textContent = left;
    if(left <= 0) { clearInterval(timer); showCelebration(); }
  }, 1000);
}

setInterval(() => {
  if (isFinished || !startTime || activeTab === 'report') return;
  const now = Date.now();
  if (now - lastInputTime > 500) instantWPM *= 0.94;
  if (keyTimes.length > 1) {
    const dur = (keyTimes[keyTimes.length - 1] - keyTimes[0]) / 60000;
    instantWPM = (instantWPM * 0.7) + ((keyTimes.length / 5) / dur * 0.3);
  }
  document.getElementById('wpm-val').textContent = Math.round(instantWPM);
}, 100);

switchMainTab('step');
</script>
</body>
</html>
